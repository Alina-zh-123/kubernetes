apiVersion: v1
kind: ConfigMap
metadata:
  name: microservices-config
  namespace: microservices
data:
  API_GATEWAY_URL: http://api-gateway:8080
  USER_SERVICE_URL: http://user-service:8081
  AUTH_SERVICE_URL: http://auth-service:8082
  ORDER_SERVICE_URL: http://order-service:8083
  PAYMENT_SERVICE_URL: http://payment-service:8084

  DB_AUTH_SERVICE_URL: jdbc:postgresql://postgres-auth-service:5432/auth_db
  DB_USER_SERVICE_URL: jdbc:postgresql://postgres-user-service:5432/user_service_db
  DB_ORDER_SERVICE_URL: jdbc:postgresql://postgres-order-service:5432/order_service_db

  KAFKA_BOOTSTRAP_SERVERS: kafka:9092

  MONGO_DB: payments_db

  RANDOM_SERVICE_URL: http://api-gateway:8080