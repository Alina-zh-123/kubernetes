apiVersion: v1
kind: Service
metadata:
  name: postgres-order-service
  namespace: microservices
spec:
  ports:
    - port: 5432
      targetPort: 5432
  selector:
    app: postgres-order-service
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres-order-service
  namespace: microservices
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres-order-service
  template:
    metadata:
      labels:
        app: postgres-order-service
    spec:
      containers:
        - name: postgres-order-service
          image: postgres:16
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: "order_service_db"
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: microservices-secret
                  key: DB_USERNAME
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: microservices-secret
                  key: DB_PASSWORD